flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/appIcon.jpg"
name: iskonnectttt
description: "Iskonnect - City Education Scholarship Program Student Panel"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase backend
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.2
  firebase_app_check: ^0.4.2
  firebase_storage: ^13.0.2
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # File Picker & Image
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  share_plus: ^10.1.4
  open_filex: ^4.5.0
  
  # Date & Time  
  intl: ^0.20.2
  
  # Utilities
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.0
  http: ^1.2.0
  image: ^4.1.0
  
  # Dialogs & Toasts
  awesome_dialog: ^3.2.0
  fluttertoast: ^8.2.4
  
  # Charts
  fl_chart: ^0.66.2
  
  # Navigation
  go_router: ^13.2.0
  
  # Form Validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0
  
  # Percent Indicator
  percent_indicator: ^4.2.3

  # PDF generation & printing
  pdf: ^3.10.8
  printing: ^5.13.1
  path_provider: ^2.1.2

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/